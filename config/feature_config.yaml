  # has_cerebrovascular_disease
  hx_stroke:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['I60', 'I61', 'I62', 'I63', 'I64', 'I65', 'I66', 'G45', 'G46']

  # has_dementia
  hx_dementia:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['F00', 'F01', 'F02', 'F03', 'F05.1', 'G30', 'G31.1']

  # has_chronic_pulmonary_disease
  hx_pulmonary:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['J40', 'J41', 'J42', 'J43', 'J44', 'J45', 'J46', 'J47', 'J60', 'J61', 'J62', 'J63', 'J64', 'J65', 'J66', 'J67']

  # has_connective_tissue_disease
  hx_rheum:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['M05', 'M06', 'M31.5', 'M32', 'M33', 'M34', 'M35.1', 'M35.3', 'M36.0']

  # has_peptic_ulcer_disease
  hx_pud:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['K25', 'K26', 'K27', 'K28']

  # has_mild_liver_disease
  hx_liver_mild:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['B18', 'K70.0', 'K70.1', 'K70.2', 'K70.3', 'K70.9', 'K71', 'K73', 'K74', 'K76.0']

  # has_diabetes_without_complications
  hx_diabetes_uncomp:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['E10.0', 'E10.1', 'E10.6', 'E10.8', 'E10.9', 'E11.0', 'E11.1', 'E11.6', 'E11.8', 'E11.9', 'E13', 'E14']

  # --- 2 Point Categories ---
  # has_hemiplegia_or_paraplegia
  hx_hemiplegia:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['G04.1', 'G11.4', 'G80.1', 'G80.2', 'G81', 'G82', 'G83.0', 'G83.1', 'G83.2', 'G83.3', 'G83.4', 'G83.9']

  # has_moderate_to_severe_renal_disease
  hx_renal_mod_sev:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['N03', 'N05.2', 'N05.3', 'N05.4', 'N05.5', 'N05.6', 'N18', 'N19', 'N25.0', 'Z49', 'Z94.0', 'Z99.2']

  # has_diabetes_with_complications
  hx_diabetes_comp:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['E10.2', 'E10.3', 'E10.4', 'E10.5', 'E10.7', 'E11.2', 'E11.3', 'E11.4', 'E11.5', 'E11.7']

  # has_metastatic_solid_tumor
  hx_cancer_solid:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['C00', 'C01', 'C02', 'C03', 'C04', 'C05', 'C06', 'C07', 'C08', 'C09', 'C10', 'C11', 'C12', 'C13', 'C14', 'C15', 'C16', 'C17', 'C18', 'C19', 'C20', 'C21', 'C22', 'C23', 'C24', 'C25', 'C26', 'C30', 'C31', 'C32', 'C33', 'C34', 'C37', 'C38', 'C39', 'C40', 'C41', 'C43', 'C45', 'C46', 'C47', 'C48', 'C49', 'C50', 'C51', 'C52', 'C53', 'C54', 'C55', 'C56', 'C57', 'C58', 'C60', 'C61', 'C62', 'C63', 'C64', 'C65', 'C66', 'C67', 'C68', 'C69', 'C70', 'C71', 'C72', 'C73', 'C74', 'C75', 'C76', 'C97']

  hx_leukemia:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['C91', 'C92', 'C93', 'C94', 'C95']

  hx_lymphoma:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['C81', 'C82', 'C83', 'C84', 'C85', 'C88', 'C90', 'C96']

  # --- 3 Point Categories ---
  hx_liver_mod_sev:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['I85.0', 'I85.9', 'I86.4', 'I98.2', 'K70.4', 'K71.1', 'K72.1', 'K72.9', 'K76.5', 'K76.6', 'K76.7']

  # --- 6 Point Categories ---
  hx_cancer_met:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['C77', 'C78', 'C79', 'C80']

  hx_aids:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['B20', 'B21', 'B22', 'B24']

  hx_hiv: # Note: Often weighted as 1 if not AIDS, but 6 in original Quan logic
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['Z21']

  # -------------------------------------
  # Increment ESBL Score
  # -------------------------------------
  increment_bsi_not_urinary_flag:
    module: 'src.phenotypes'
    function: 'derive_bsi_not_urinary'
    kwargs:
      target_col: 'bsi_source'
      urine_culture_code: 'LOINC-630-4'

  increment_is_non_ecoli_flag:
    module: 'src.phenotypes'
    function: 'derive_is_non_ecoli'
    kwargs:
      target_col: 'ORGANISM_BUG'

  increment_abx_inappropriate_flag:
    module: 'src.phenotypes'
    function: 'derive_abx_inappropriate'
    kwargs:
      window_hours: 24

  # ---------------------------------------
  # Holmgren Score
  # ---------------------------------------
  hx_prior_abx_30d:
    module: 'src.phenotypes'
    function: 'has_medication_in_window'
    kwargs:
      window_hours: 720  # 30 days * 24 hours
      target_meds:
        - 'ceftriaxone'
        - 'cefepime'
        - 'ciprofloxacin'
        - 'levofloxacin'
        # ... add your specific ABX list here

    hx_prior_fc_abx_90d:
      module: 'src.phenotypes'
      function: 'has_medication_in_window'
      kwargs:
        window_hours: 2160  # 90 days * 24 hours
        target_meds:
          - 'ciprofloxacin'
          - 'levofloxacin'
          - 'ceftriaxone'
          - 'ceftazidime'

  # ---------------------------------------
  # Gavaghan Score
  # ---------------------------------------
  hx_nursing_home_resident:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
