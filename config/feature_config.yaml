  # Note: Gavaghan used 'hx_prior_fc_abx_90d' for just fluoroquinolones/cephalosporins.
  # Tumbarello/Kim usually look at a broader list of beta-lactams.
  hx_prior_abx_90d:
    module: 'src.phenotypes'
    function: 'has_medication_in_window'
    kwargs:
      window_hours: 2160  # 90 days * 24 hours
      target_meds:
        - 'amoxicillin'
        - 'piperacillin'
        - 'meropenem'
        - 'ceftriaxone'
        - 'ciprofloxacin'
        # ... expand with your formulary's standard broad-spectrum ABX

  # -------------------------------------------------------------
  # Prior Hospitalizations (Requires an Episodes/Encounters lookup)
  # -------------------------------------------------------------

  # If you have an explicit 'previous_admissions_count' column in your static data,
  # you don't even need a python function, you can use pandas eval!
  hx_hosp_last_90d:
    module: 'src.phenotypes'
    function: 'derive_historical_condition' # You may need to tweak this helper to check dates if it only checks codes
    kwargs:
      target_codes: [ 'placeholder_for_admission_code' ]


# =============================================================================
# 4. CUSTOM SCORES (Final Clinical Risk Calculations)
# =============================================================================
# This section computes the standardized clinical metrics (like Charlson or INCREMENT).
# It relies on the clean features and phenotypes we generated in the steps above.
# The pipeline maps the column names in our dataset (kwargs) directly to the
# arguments expected by the mathematical scoring functions in `src/scores.py`.
custom_scores:

  charlson_score:
    module: 'src.scores'
    function: 'calculate_charlson'
    kwargs:
      age_col: 'AGE_AT_ADMISSION'
      comorbidities:
        # 1 Point
        hx_mi: 1
        hx_chf: 1
        hx_pvd: 1
        hx_stroke: 1
        hx_dementia: 1
        hx_pulmonary: 1
        hx_rheum: 1
        hx_pud: 1
        hx_liver_mild: 1
        hx_diabetes_uncomp: 1
        # 2 Points
        hx_hemiplegia: 2
        hx_renal_mod_sev: 2
        hx_diabetes_comp: 2
        hx_cancer_solid: 2
        hx_leukemia: 2
        hx_lymphoma: 2
        # 3 Points
        hx_liver_mod_sev: 3
        # 6 Points
        hx_cancer_met: 6
        hx_aids: 6

  charlson_quan_score:
    module: 'src.scores'
    function: 'calculate_charlson_quan'
    kwargs:
      age_col: 'AGE_AT_ADMISSION'
      # Simple 1-point categories
      mi_col: 'hx_mi'
      chf_col: 'hx_chf'
      pvd_col: 'hx_pvd'
      stroke_col: 'hx_stroke'
      dementia_col: 'hx_dementia'
      pulmonary_col: 'hx_pulmonary'
      rheum_col: 'hx_rheum'
      pud_col: 'hx_pud'
      # Hierarchical and weighted categories
      liver_mild_col: 'hx_liver_mild'
      liver_sev_col: 'hx_liver_mod_sev'
      diabetes_uncomp_col: 'hx_diabetes_uncomp'
      diabetes_comp_col: 'hx_diabetes_comp'
      cancer_solid_col: 'hx_cancer_solid'
      cancer_met_col: 'hx_cancer_met'
      hiv_col: 'hx_hiv'
      aids_col: 'hx_aids'
      renal_sev_col: 'hx_renal_mod_sev'

  pitt_score:
    module: 'src.scores'
    function: 'calculate_pitt_score'
    kwargs:
      temp_col: 'temp_24h_max' # Using the engineered rolling max
      hypotens_col: 'hypotension_flag'
      vent_col: 'mech_vent_flag'
      arrest_col: 'cardiac_arrest_flag'
      mental_col: 'mental_status_score'

  sirs_count:
    module: 'src.scores'
    function: 'calculate_sirs'
    kwargs:
      tachycardia_col: 'sirs_tachycardia_flag' # temp_24h_max
      tachypnea_col: 'sirs_tachypnea_flag'     # hr_24h_max
      temp_col: 'sirs_abnormal_temp_flag'      # rr_24h_max
      wbc_col: 'sirs_abnormal_wbc_flag'        # wbc

  mews_score:
    module: 'src.scores'         # The python file (src/scores.py)
    function: 'calculate_mews'   # The specific function to call
    kwargs:                      # The column mappings to pass to the function
      rr_col: 'rr_24h_max'
      hr_col: 'hr_24h_max'
      sbp_col: 'sbp_24h_min'     # SBP MEWS points are mostly for low BP
      temp_col: 'temp_24h_max'

  increment_esbl_score:
    module: 'src.scores'
    function: 'calculate_increment_esbl'
    kwargs:
      age_col: 'AGE_AT_ADMISSION'
      charlson_col: 'charlson_quan_score'  # References the score computed above
      pitt_col: 'pitt_score'               # References the score computed above
      sirs_col: 'sirs_count'               # References the score computed above
      bsi_not_urinary_col: 'increment_bsi_not_urinary_flag'
      is_non_ecoli_col: 'increment_is_non_ecoli_flag'
      inapprop_abx_col: 'increment_abx_inappropriate_flag'

  holmgren_score:
    module: 'src.scores'
    function: 'calculate_holmgren_score'
    kwargs:
      hosp_abroad_col: 'hx_hosp_abroad_12m'
      prev_culture_col: 'hx_prev_3gcr_culture'
      prev_swab_col: 'hx_prev_3gcr_rectal_swab'

  gavaghan_score:
    module: 'src.scores'
    function: 'calculate_gavaghan_score'
    kwargs:
      age_col: 'AGE_AT_ADMISSION'
      prior_esbl_col: 'hx_prior_esbl_365d'
      nursing_home_col: 'hx_nursing_home_resident'
      urinary_catheter_col: 'hx_urinary_catheter_present'
      prior_abx_col: 'hx_prior_fc_abx_90d'

  jones_score:
    module: 'src.scores'
    function: 'calculate_jones_score'
    kwargs:
      prior_esbl_col: 'hx_prior_esbl_180d'
      prior_abx_col: 'hx_prior_abx_30d'
      chronic_dialysis_col: 'hx_chronic_dialysis'
      transfer_hosp_col: 'hx_transfer_from_hosp'

  tumbarello_score:
    module: 'src.scores'
    function: 'calculate_tumbarello_score'
    kwargs:
      prior_esbl_col: 'hx_prior_esbl_any'
      hosp_90d_col: 'hx_hosp_last_90d'
      abx_90d_col: 'hx_prior_abx_90d'
      urinary_catheter_col: 'hx_urinary_catheter_present'

  kim_score:
    module: 'src.scores'
    function: 'calculate_kim_score'
    kwargs:
      prior_esbl_col: 'hx_prior_esbl_any'
      hosp_1y_col: 'hx_hosp_last_365d'
      nursing_home_col: 'hx_nursing_home_resident'
      urinary_catheter_col: 'hx_urinary_catheter_present'
      prior_abx_90d_col: 'hx_prior_abx_90d'