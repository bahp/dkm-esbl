# config/feature_config.yaml
# =============================================================================
# 1. BASE FEATURES (Time-Series Cleaning & Windowing)
# =============================================================================
# This section automates the processing of raw, messy time-series data (like vitals).
# Instead of writing complex Python loops, you declare what you want here:
# - impute: How to fill missing data (e.g., 'ffill' carries the last known value forward).
# - missing_indicator: If true, creates a new column flagging where data was originally missing.
# - rolling: Automatically calculates windowed features (e.g., maximum heart rate over 24h).
base_features:
  hr:
    impute: 'ffill'
    missing_indicator: false
    delta: true
    rolling:
      windows: ['24h', '7D']
      aggs: ['mean', 'max']

  sbp:
    impute: 'ffill'
    missing_indicator: false
    delta: true
    rolling:
      windows: ['24h']
      aggs: ['min'] # For SBP, we usually care about the lowest drops

  rr:
    impute: 'ffill'

  crp:
    impute: 'constant'
    fill_value: 5.0
    missing_indicator: true

# =============================================================================
# 2. COMPUTED FEATURES (Fast Mathematical Expressions)
# =============================================================================
# This section uses the Pandas `df.eval()` engine. It allows you to write
# simple, one-line mathematical equations or logic as strings.
# - It is extremely fast.
# - Boolean logic (like `rr >= 22`) automatically evaluates to 1 (True) or 0 (False),
# - Easy to build simple additive scores without writing a full Python function.

# USES df.eval() - EXPLAIN
computed_features:
  # Clinical Ratios
  shock_index: "hr / sbp"

  # Clinical Scores (e.g., simplified qSOFA: RR >= 22 and SBP <= 100)
  qsofa_score: "(rr >= 22) + (sbp <= 100)"

  # Hypothetical composite feature
  vitals_stress_factor: "(hr_24h_mean / 80) + (temp - 37)"

  # Hypothetical ground truth.
  sepsis_case: "(qsofa_score >= 1) + 0"

  # This does the exact same thing as the Python function, but in one line!
  # It evaluates to True (1) or False (0).
  #derived_diabetes_simple: "(med_insulin_given == 1) or (Glucose_24h_max > 200)"

# =============================================================================
# 3. CUSTOM FEATURES (Complex Phenotyping)
# =============================================================================
# When a feature is too complex for a one-line equation (like searching through
# text for ICD-10 codes or combining multiple rules), we define it as a "Phenotype".
# This section tells the pipeline which Python function to run and which columns
# from the dataset to pass into it as arguments (kwargs).
custom_features:

  # --------------------------------------
  # Ground truth labels
  # --------------------------------------
  ground_truth:
    module: 'src.phenotypes'
    function: 'derive_ground_truth'
    kwargs:
      seed: 123


  # -------------------------------------
  # Partials for Pitt Sore
  # -------------------------------------
  pitt_fever_status_score:
    module: 'src.phenotypes'
    function: 'derive_fever_status'
    kwargs:
      temp_cols:
        - 'temp_24h_max'
        - 'temp_24h_min'
        - 'temp'

  has_vasopressors:
    module: 'src.phenotypes'
    function: 'has_medication_in_window'
    kwargs:
      window_hours: 24
      target_meds:
        - 'norepinephrine'
        - 'epinephrine'
        - 'vasopressin'
        - 'dopamine'
        - 'dobutamine'
        - 'phenylephrine'
        - 'noradrenaline'
        - 'angiotensin'

  pitt_hypotension_flag:
    module: 'src.phenotypes'
    function: 'derive_hypotension_status'
    kwargs:
      sbp_col: 'sbp_24h_min'
      vasopressor_col: 'has_vasopressors'

  # -------------------------------------
  # Partials for SIRS
  # -------------------------------------
  sirs_tachycardia_flag:
    module: 'src.phenotypes'
    function: 'derive_tachycardia'
    kwargs:
      hr_col: 'hr_24h_max'

  sirs_tachypnea_flag:
    module: 'src.phenotypes'
    function: 'derive_tachypnea'
    kwargs:
      rr_col: 'rr_24h_max'
      paco2_col: 'paco2'

  sirs_abnormal_temp_flag:
    module: 'src.phenotypes'
    function: 'derive_abnormal_temp'
    kwargs:
      temp_cols:
        - 'temp_24h_max'
        - 'temp_24h_min'
        - 'temp'

  sirs_abnormal_wbc_flag:
    module: 'src.phenotypes'
    function: 'derive_abnormal_wbc'
    kwargs:
      wbc_col: 'wbc'
      bands_col: 'bands'

  # ---------------------------------------------
  # Partials for Charlson / Charslson quan score
  # ---------------------------------------------
  charlson_mi_flag: # has_myocardial_infarction
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes:
        - '323..00' # Read codes from your docstring
        - 'G30..00'
        - 'I21'     # Example ICD-10
        - 'I22'
        - 'I25.2'

  hx_mi: # has_myocardial_infarction
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['I21', 'I22', 'I25.2', '323..00', 'G30..00']

  # has_congestive_heart_failure
  hx_chf:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
      target_codes: ['I50', 'I11.0', 'G58..00']

  # has_peripheral_vascular_disease
  hx_pvd:
    module: 'src.phenotypes'
    function: 'derive_historical_condition'
    kwargs:
